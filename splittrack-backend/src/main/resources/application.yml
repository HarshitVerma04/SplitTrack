spring:
  application:
    name: splittrack-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/splittrack}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:harshit}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-super-secret-key-change-me-super-secret-key}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
