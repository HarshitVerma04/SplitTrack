spring:
  application:
    name: splititup-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/splititup}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
